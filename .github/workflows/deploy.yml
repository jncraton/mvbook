name: Deploy
on:
  push:
    tags:
      - 'v*.*.*'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -r requirements.txt
      - name: Build sdist
        run: python setup.py sdist bdist_wheel
      - name: Publish to PyPI (placeholder)
        run: echo "Publishing..."
